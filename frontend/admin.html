<!DOCTYPE html>

<html lang="es">

<head>

  <meta charset="UTF-8">

  <title>Panel Administrador</title>



  <!-- Bootstrap -->

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">



  <!-- CSS  -->

  <link rel="stylesheet" href="css/styles.css">

</head>

<body class="container mt-4">



  <h1 class="mb-4">⚙️ Panel de Administración</h1>



  <form id="workshopForm" class="mb-4">

    <input id="name" class="form-control mb-2" placeholder="Nombre del taller" required>

    <input id="description" class="form-control mb-2" placeholder="Descripción">

    <input id="date" type="date" class="form-control mb-2">

    <input id="time" type="time" class="form-control mb-2">

    <input id="place" class="form-control mb-2" placeholder="Lugar">

    <input id="category" class="form-control mb-2" placeholder="Categoría">



    <button class="btn btn-primary">Guardar Taller</button>

  </form>



  <table class="table table-striped">

    <thead>

      <tr>

        <th>Nombre</th>

        <th>Fecha</th>

        <th>Acciones</th>

      </tr>

    </thead>

    <tbody id="adminTable"></tbody>

  </table>



  <!-- JavaScript -->

  <script src="js/admin.js"></script>

</body>

</html>
